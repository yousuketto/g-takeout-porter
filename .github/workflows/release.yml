name: Release

on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: true
    - name: Test
      run: go test -v -race -cover ./...
    - name: Build
      run: |
        GOOS=linux GOARCH=amd64 go build -v -o g-takeout-porter ./cmd/takeout-porter
        sha256sum g-takeout-porter
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: g-takeout-porter
        path: g-takeout-porter
        retention-days: 1
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        name: g-takeout-porter
        path: g-takeout-porter
    - name: Release note and upload
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tar -zcvf g-takeout-porter_${{ github.ref_name }}_linux_amd64.tar.gz g-takeout-porter
        sha256sum g-takeout-porter_${{ github.ref_name }}_linux_amd64.tar.gz > checksum.txt
        gh release create ${{ github.ref_name }} \
          ./g-takeout-porter_${{ github.ref_name }}_linux_amd64.tar.gz \
          ./checksum.txt \
          --title "Release ${{ github.ref_name }}" \
          --generate-notes

